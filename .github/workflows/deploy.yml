name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "3.78.12"
          command: pages deploy . --project-name=takumi-master --branch=main --commit-dirty=true

      - name: Set secrets via wrangler
        run: |
          echo "$GOOGLE_CLIENT_ID"     | npx wrangler@3.78.12 pages secret put GOOGLE_CLIENT_ID     --project-name=takumi-master
          echo "$GOOGLE_CLIENT_SECRET" | npx wrangler@3.78.12 pages secret put GOOGLE_CLIENT_SECRET  --project-name=takumi-master
          echo "$JWT_SECRET"           | npx wrangler@3.78.12 pages secret put JWT_SECRET            --project-name=takumi-master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
