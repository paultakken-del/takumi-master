name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Deploy trigger'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Cloudflare Pages secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          npm install -g wrangler
          echo "$GOOGLE_CLIENT_ID"     | wrangler pages secret put GOOGLE_CLIENT_ID     --project-name Takumi-master
          echo "$GOOGLE_CLIENT_SECRET" | wrangler pages secret put GOOGLE_CLIENT_SECRET  --project-name Takumi-master
          echo "$JWT_SECRET"           | wrangler pages secret put JWT_SECRET            --project-name Takumi-master

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy . --project-name=Takumi-master --branch=main
