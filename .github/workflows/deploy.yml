name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set secrets + Deploy via Cloudflare API
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          # Account ID ophalen
          ACCOUNT_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          echo "Account: $ACCOUNT_ID"

          # Exacte projectnaam ophalen
          PROJECT=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CF_TOKEN" | \
            python3 -c "
import sys,json
data=json.load(sys.stdin)
for p in data.get('result',[]):
    if 'takumi' in p['name'].lower():
        print(p['name'])
        break
")
          echo "Project: $PROJECT"

          # Secrets instellen
          RESULT=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"deployment_configs\":{\"production\":{\"env_vars\":{
              \"GOOGLE_CLIENT_ID\":{\"value\":\"$GOOGLE_CLIENT_ID\"},
              \"GOOGLE_CLIENT_SECRET\":{\"value\":\"$GOOGLE_CLIENT_SECRET\"},
              \"JWT_SECRET\":{\"value\":\"$JWT_SECRET\"}
            }}}}")
          echo "Secrets: $(echo $RESULT | python3 -c 'import sys,json; r=json.load(sys.stdin); print("OK" if r.get("success") else r.get("errors"))')"

      - name: Deploy via wrangler
        run: |
          npm install -g wrangler@3
          npx wrangler pages deploy . \
            --project-name=Takumi-master \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
